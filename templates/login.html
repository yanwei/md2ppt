<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · md2ppt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📑</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      text-align: center;
    }
    .logo {
      font-size: 1.9rem; font-weight: 700;
      color: #0f172a; letter-spacing: -.03em;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: .85rem; color: #64748b;
      margin-bottom: 36px;
    }
    .divider {
      height: 1px; background: #e2e8f0;
      margin-bottom: 28px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: .85rem; font-weight: 600; color: #374151;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: .95rem; color: #0f172a;
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus {
      border-color: #3b82f6;
    }
    .btn-submit {
      width: 100%; padding: 12px 20px;
      background: #3b82f6;
      color: #fff; font-size: .95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .1s;
      box-shadow: 0 2px 8px rgba(59,130,246,.35);
    }
    .btn-submit:hover { background: #2563eb; }
    .btn-submit:active { transform: scale(.98); }
    .hint {
      margin-top: 10px;
      font-size: .78rem; color: #94a3b8;
      text-align: left;
    }
    .error {
      margin-top: 16px;
      font-size: .82rem; color: #ef4444;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px;
      text-align: left;
    }
    .footer {
      margin-top: 28px;
      font-size: .75rem; color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">md2ppt</div>
    <div class="tagline">Markdown 转 PPT 风格演示文稿</div>
    <div class="divider"></div>

    <form method="post" action="{{ url_for('login_page') }}">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username"
               placeholder="输入你的用户名" autocomplete="username"
               maxlength="20" autofocus>
      </div>
      <button type="submit" class="btn-submit">进入系统</button>
      <div class="hint">字母、数字或中文，1~20 个字符。相同用户名下次可继续查看记录。</div>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="footer">无需密码，输入用户名即可使用</div>
  </div>
</body>
</html>

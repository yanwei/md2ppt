<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · md2ppt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📑</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      text-align: center;
    }
    .logo { font-size: 1.9rem; font-weight: 700; color: #0f172a; letter-spacing: -.03em; margin-bottom: 6px; }
    .tagline { font-size: .85rem; color: #64748b; margin-bottom: 36px; }
    .divider { height: 1px; background: #e2e8f0; margin-bottom: 28px; }
    .form-group { text-align: left; margin-bottom: 12px; }
    .form-group label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .95rem; color: #0f172a; outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: #3b82f6; }
    .btn-submit {
      width: 100%; padding: 12px 20px;
      background: #3b82f6; color: #fff;
      font-size: .95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background .2s, transform .1s;
      box-shadow: 0 2px 8px rgba(59,130,246,.35);
    }
    .btn-submit:hover { background: #2563eb; }
    .btn-submit:active { transform: scale(.98); }
    .hint { margin-top: 8px; font-size: .78rem; color: #94a3b8; text-align: left; }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: #94a3b8; font-size: .8rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #e2e8f0;
    }
    .btn-feishu {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px;
      background: #3370ff; color: #fff;
      font-size: .95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(51,112,255,.35);
    }
    .btn-feishu:hover { background: #2060f0; box-shadow: 0 4px 16px rgba(51,112,255,.45); }
    .btn-feishu:active { transform: scale(.98); }
    .btn-feishu svg { width: 22px; height: 22px; flex-shrink: 0; }
    .error {
      margin-top: 16px; font-size: .82rem; color: #ef4444;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px; text-align: left;
    }
    .footer { margin-top: 28px; font-size: .75rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">md2ppt</div>
    <div class="tagline">Markdown 转 PPT 风格演示文稿</div>
    <div class="divider"></div>

    <form method="post" action="{{ url_for('login_page') }}">
      <div class="form-group">
        <label for="username">用户名登录</label>
        <input type="text" id="username" name="username"
               placeholder="输入你的用户名" autocomplete="username"
               maxlength="20" autofocus>
      </div>
      <button type="submit" class="btn-submit">进入系统</button>
      <div class="hint">字母、数字或中文，1~20 个字符。相同用户名下次可继续查看记录。</div>
    </form>

    {% if feishu_enabled %}
    <div class="or-divider">或</div>
    <a href="{{ url_for('auth_feishu') }}" class="btn-feishu">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4C12.954 4 4 12.954 4 24s8.954 20 20 20 20-8.954 20-20S35.046 4 24 4z" fill="#fff" fill-opacity=".15"/>
        <path d="M19.5 16.5C19.5 16.5 22 14 26.5 15.5C31 17 31.5 21 31.5 21C31.5 21 28 19.5 25 20.5C22 21.5 21 24.5 21 24.5L16.5 21.5C16.5 21.5 16 20 19.5 16.5Z" fill="white"/>
        <path d="M16 24.5C16 24.5 18.5 22.5 21.5 23.5C24.5 24.5 24.5 27.5 24.5 27.5C24.5 27.5 22 26.5 19.5 27C17 27.5 16 30 16 30L12 27.5C12 27.5 11.5 26 16 24.5Z" fill="white"/>
        <path d="M22 29C22 29 25 27.5 28 29C31 30.5 31 33.5 31 33.5C31 33.5 28.5 32.5 26 33C23.5 33.5 23 36 23 36L19 33.5C19 33.5 18.5 31.5 22 29Z" fill="white"/>
      </svg>
      使用飞书账号登录
    </a>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="footer">无需密码，输入用户名即可使用</div>
  </div>
</body>
</html>
